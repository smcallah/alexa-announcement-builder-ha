send:
  name: Send Alexa announcement
  description: Build an ordered Alexa SSML sequence and send it through a notify entity.
  fields:
    target:
      name: Target
      description: Alexa Devices Speak or Announce notify entity that will receive the SSML.
      required: true
      example: notify.office_echo_speak
      selector:
        entity:
          filter:
            - integration: alexa_devices
              domain: notify
    sequence:
      name: Sequence
      description: Add Message, Sound, or Raw SSML items. Drag the collapsed items to set playback order.
      required: true
      selector:
        object:
          multiple: true
          label_field: content_type
          description_field: sound
          fields:
            content_type:
              label: Content type
              required: true
              selector:
                select:
                  options:
                    - Message
                    - Sound
                    - Raw SSML
            text:
              label: Message text
              selector:
                text:
                  multiline: true
            sound:
              label: Sound
              selector:
                select:
                  mode: dropdown
                  custom_value: true
                  options:
                    - label: Doorbell chime
                      value: Doorbell chime
                    - label: Door knock
                      value: Door knock
                    - label: Applause
                      value: Applause
                    - label: Positive response
                      value: Positive response
                    - label: Negative response
                      value: Negative response
                    - label: Game show intro
                      value: Game show intro
                    - label: Alarm buzzer
                      value: Alarm buzzer
                    - label: Dog bark
                      value: Dog bark
                    - label: Cat meow
                      value: Cat meow
                    - label: Rooster crow
                      value: Rooster crow
                    - label: Thunder
                      value: Thunder
                    - label: Fire extinguisher
                      value: Fire extinguisher
            raw_ssml:
              label: Raw SSML
              selector:
                text:
                  multiline: true
            voice:
              label: Voice
              selector:
                select:
                  mode: dropdown
                  options:
                    - label: Alexa+ default voice
                      value: alexa_plus
                    - label: Original Alexa default voice
                      value: original_alexa
                    - label: Ivy - English, American (en-US)
                      value: Ivy
                    - label: Joanna - English, American (en-US)
                      value: Joanna
                    - label: Joey - English, American (en-US)
                      value: Joey
                    - label: Justin - English, American (en-US)
                      value: Justin
                    - label: Kendra - English, American (en-US)
                      value: Kendra
                    - label: Kimberly - English, American (en-US)
                      value: Kimberly
                    - label: Matthew - English, American (en-US)
                      value: Matthew
                    - label: Salli - English, American (en-US)
                      value: Salli
                    - label: Nicole - English, Australian (en-AU)
                      value: Nicole
                    - label: Russell - English, Australian (en-AU)
                      value: Russell
                    - label: Amy - English, British (en-GB)
                      value: Amy
                    - label: Brian - English, British (en-GB)
                      value: Brian
                    - label: Emma - English, British (en-GB)
                      value: Emma
                    - label: Aditi - English, Indian / Hindi (en-IN, hi-IN)
                      value: Aditi
                    - label: Raveena - English, Indian (en-IN)
                      value: Raveena
                    - label: Geraint - English, Welsh (en-GB-WLS)
                      value: Geraint
                    - label: Chantal - French, Canadian (fr-CA)
                      value: Chantal
                    - label: Celine - French, France (fr-FR)
                      value: Celine
                    - label: Lea - French, France (fr-FR)
                      value: Lea
                    - label: Mathieu - French, France (fr-FR)
                      value: Mathieu
                    - label: Hans - German (de-DE)
                      value: Hans
                    - label: Marlene - German (de-DE)
                      value: Marlene
                    - label: Vicki - German (de-DE)
                      value: Vicki
                    - label: Carla - Italian (it-IT)
                      value: Carla
                    - label: Giorgio - Italian (it-IT)
                      value: Giorgio
                    - label: Bianca - Italian (it-IT)
                      value: Bianca
                    - label: Mizuki - Japanese (ja-JP)
                      value: Mizuki
                    - label: Takumi - Japanese (ja-JP)
                      value: Takumi
                    - label: Vitoria - Portuguese, Brazilian (pt-BR)
                      value: Vitoria
                    - label: Camila - Portuguese, Brazilian (pt-BR)
                      value: Camila
                    - label: Ricardo - Portuguese, Brazilian (pt-BR)
                      value: Ricardo
                    - label: Penelope - Spanish, American (es-US)
                      value: Penelope
                    - label: Lupe - Spanish, American (es-US)
                      value: Lupe
                    - label: Miguel - Spanish, American (es-US)
                      value: Miguel
                    - label: Conchita - Spanish, Castilian (es-ES)
                      value: Conchita
                    - label: Enrique - Spanish, Castilian (es-ES)
                      value: Enrique
                    - label: Lucia - Spanish, Castilian (es-ES)
                      value: Lucia
                    - label: Mia - Spanish, Mexican (es-MX)
                      value: Mia
            rate:
              label: Rate
              selector:
                choose:
                  choices:
                    Named rate:
                      selector:
                        select:
                          mode: dropdown
                          options:
                            - x-slow
                            - slow
                            - medium
                            - fast
                            - x-fast
                    Enter %-age:
                      selector:
                        number:
                          min: 20
                          max: 200
                          step: any
                          unit_of_measurement: "%"
                          mode: box
            pitch:
              label: Pitch
              selector:
                choose:
                  choices:
                    Named pitch:
                      selector:
                        select:
                          mode: dropdown
                          options:
                            - x-low
                            - low
                            - medium
                            - high
                            - x-high
                    Enter %-age:
                      selector:
                        number:
                          min: -33.3
                          max: 50
                          step: any
                          unit_of_measurement: "%"
                          mode: box
            volume:
              label: Volume
              selector:
                choose:
                  choices:
                    Named volume:
                      selector:
                        select:
                          mode: dropdown
                          options:
                            - silent
                            - x-soft
                            - soft
                            - medium
                            - loud
                            - x-loud
                    Enter dB adjustment:
                      selector:
                        number:
                          min: -6
                          max: 6
                          step: any
                          unit_of_measurement: dB
                          mode: box
            whisper:
              label: Whisper
              selector:
                boolean:
            emotion:
              label: Emotion
              selector:
                select:
                  options:
                    - excited
                    - disappointed
            emotion_intensity:
              label: Emotion intensity
              selector:
                select:
                  options:
                    - low
                    - medium
                    - high
            domain:
              label: Speech domain
              selector:
                select:
                  options:
                    - music
                    - news
                    - conversational
                    - long-form
    break_before_ms:
      name: Break before
      description: Silent break before the complete sequence, in milliseconds.
      selector:
        number:
          min: 0
          max: 10000
          unit_of_measurement: ms
          mode: box
    break_after_ms:
      name: Break after
      description: Silent break after the complete sequence, in milliseconds.
      selector:
        number:
          min: 0
          max: 10000
          unit_of_measurement: ms
          mode: box
